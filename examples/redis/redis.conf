# Asteroid Redis Configuration
#

# Disable persistence completely
save ""
appendonly no
rdbcompression no
rdbchecksum no

# Disable background operations that trigger overcommit warnings
stop-writes-on-bgsave-error no
rdb-save-incremental-fsync no

# Logging - suppress startup warnings
loglevel warning

# Memory management
maxmemory-policy noeviction

# Network
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# Security (development only)
protected-mode no

# Disable problematic features
latency-monitor-threshold 0
